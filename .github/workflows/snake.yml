name: Generate Snake
 
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2   # Node 24 destekli son sürüm
 
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
 
      - name: Push Changes
        uses: crazy-max/ghaction-github-pages@v4.0.0   # Node 24 destekli son sürüm
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
